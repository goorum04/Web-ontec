<!DOCTYPE html>
<html lang="ca" data-mood="acid" data-voice="editorial" data-intensity="cinematic">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ontec — Serveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="components.jsx"></script>
  <style>html,body{background:#000;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const SVCS = [
  {
    id:'ingenieries', n:'01', title:'Ingenierías',
    img:'https://images.unsplash.com/photo-1581094288338-2314dddb7ece?w=1400&q=80&auto=format&fit=crop',
    desc:"Col·laborem amb equips d'enginyeria per aportar la nostra experiència en comunicacions, automatitzacions i integracions de sistemes tecnològics i A/V. Actuem com a especialistes externs que complementen l'equip de l'enginyeria.",
    bullet:["Prescripció i especificació de productes","Assessorament tècnic en projectes","Suport en la redacció de plecs de condicions","Assistència tècnica en obra","Formació específica per als tècnics del projecte"],
  },
  {
    id:'arquitectures', n:'02', title:'Arquitectures',
    img:'https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=1400&q=80&auto=format&fit=crop',
    desc:"Treballem estretament amb estudis d'arquitectura per integrar la tecnologia en el disseny de l'espai des de la fase inicial del projecte. Entenem el llenguatge del disseny i sabem com fer la tecnologia invisible però present.",
    bullet:["Integració en fase de projecte (BIM)","Disseny de sistemes discrets i estètics","Coordinació amb altres industrials","Solucions domòtiques i d'automatització","Il·luminació intel·ligent DALI i KNX"],
  },
  {
    id:'installadors', n:'03', title:"Instal·ladors",
    img:'https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=1400&q=80&auto=format&fit=crop',
    desc:"Proveïm als instal·ladors amb tot tipus de solucions tecnològiques adaptades a tots els escenaris en els àmbits en què estem especialitzats. Oferim suport tècnic, formació i assistència en obra.",
    bullet:["Subministre de materials i equipaments","Preconfiguració d'equips en taller","Assistència tècnica en obra","Formació i certificació de producte","Gestió de garanties i RMAs"],
  },
  {
    id:'disseny', n:'04', title:"Disseny d'Interiors",
    img:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1400&q=80&auto=format&fit=crop',
    desc:"Treballem amb dissenyadors d'interiors per fer que la tecnologia sigui part integral del disseny, no un element afegit. Il·luminació intel·ligent, A/V empotrat i automatització discreta per als millors espais.",
    bullet:["Il·luminació escènica i ambiental","Sistemes d'àudio invisibles (in-ceiling, in-wall)","Pantalles i projectors integrats en mobles","Control centralitzat i intuïtiu","Documentació tècnica per al client final"],
  },
];

function ServeisPage() {
  const [active, setActive] = useState(0);
  const s = SVCS[active];
  return (
    <PageShell activePage="Serveis">
      <PageHero kicker="Serveis" img="https://images.unsplash.com/photo-1497366216548-37526070297c?w=2000&q=80&auto=format&fit=crop"
        title={<>Adaptat al teu<br/>sector professional</>}
        sub="Ens adaptem a cada perfil professional. Treballem com a extensió del teu equip per garantir el millor resultat tecnològic." />

      <div className="wrap-wide" style={{ padding:'80px 40px' }}>
        <div style={{ display:'grid', gridTemplateColumns:'260px 1fr', gap:56, alignItems:'start' }} className="srv-grid">
          {/* Side menu */}
          <div style={{ display:'flex', flexDirection:'column', gap:6, position:'sticky', top:100 }}>
            {SVCS.map((sv,i)=>(
              <button key={i} onClick={()=>setActive(i)}
                style={{ display:'flex', alignItems:'center', gap:14, padding:'16px 18px', background:active===i?A(9):'transparent',
                  border:active===i?`1px solid ${A(32)}`:'1px solid var(--line-soft)', borderRadius:12, cursor:'pointer', textAlign:'left', transition:'all .18s',
                  color:active===i?'var(--ink)':'var(--mut)' }}>
                <span style={{ fontFamily:'var(--mono)', fontSize:11, color:active===i?'var(--accent)':'var(--faint)', letterSpacing:'.06em' }}>{sv.n}</span>
                <span className="disp" style={{ fontSize:17 }}>{sv.title}</span>
                {active===i && <span style={{ marginLeft:'auto', color:'var(--accent)' }}><Icons.Arrow s={15}/></span>}
              </button>
            ))}
          </div>

          {/* Main panel */}
          <div key={active}>
            <Reveal className="mcard" as="div" style={{ height:380, marginBottom:48, borderRadius:20 }}>
              <Cine src={s.img} alt={s.title} style={{ position:'absolute', inset:0 }}/>
              <div className="mc-shade"/>
              <div style={{ position:'relative', zIndex:1, height:'100%', display:'flex', flexDirection:'column', justifyContent:'flex-end', padding:'40px 44px' }}>
                <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--accent)', letterSpacing:'.14em', marginBottom:12 }}>{s.n} / {s.title.toUpperCase()}</div>
                <h2 className="disp" style={{ fontSize:'clamp(34px,5vw,68px)' }}>{s.title}</h2>
              </div>
            </Reveal>

            <Reveal><p style={{ fontSize:18, color:'var(--mut)', lineHeight:1.85, marginBottom:52 }}>{s.desc}</p></Reveal>

            <Reveal><div className="kicker" style={{ color:'var(--faint)', marginBottom:22 }}>Què oferim</div></Reveal>
            <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:56 }}>
              {s.bullet.map((b,i)=>(
                <Reveal key={i} delay={i*55}>
                  <div style={{ display:'flex', alignItems:'center', gap:15, padding:'18px 22px', background:'var(--panel)', border:'1px solid var(--line)', borderRadius:13 }}>
                    <span style={{ color:'var(--accent)', flexShrink:0 }}><Icons.Check/></span>
                    <span style={{ fontSize:15.5, color:'var(--ink)' }}>{b}</span>
                  </div>
                </Reveal>
              ))}
            </div>

            <Reveal><a href="contacta.html" className="btn btn-primary">Parlem del teu projecte <Icons.UpRight s={14}/></a></Reveal>
          </div>
        </div>
      </div>
      <style>{`@media(max-width:880px){.srv-grid{grid-template-columns:1fr!important;}}`}</style>
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ServeisPage/>);
</script>
</body>
</html>
