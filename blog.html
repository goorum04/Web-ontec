const CATS = ['Tots','Comunicacions','IT Security','Domòtica','Automatització','Audiovisuals'];
const bySlug = (s) => ARTICLES.find(a => a.slug === s);

/* ════════ Body renderer ════════ */
function ArticleBody({ blocks }) {
  return (
    <div>
      {blocks.map((b, i) => {
        if (b.h) return <h2 key={i} className="disp" style={{ fontSize:'clamp(26px,2.6vw,38px)', margin:'48px 0 18px' }}>{b.h}</h2>;
        if (b.q) return (
          <blockquote key={i} style={{ margin:'44px 0', paddingLeft:30, borderLeft:'2px solid var(--accent)' }}>
            <p className="disp" style={{ fontSize:'clamp(22px,2.2vw,30px)', lineHeight:1.4, fontStyle:'var(--ditalic)' }}>{b.q}</p>
          </blockquote>
        );
        if (b.ul) return (
          <ul key={i} style={{ margin:'8px 0', listStyle:'none', display:'flex', flexDirection:'column', gap:14 }}>
            {b.ul.map((li, j) => (
              <li key={j} style={{ display:'flex', gap:14, alignItems:'flex-start', fontSize:17, color:'var(--mut)', lineHeight:1.7 }}>
                <span style={{ color:'var(--accent)', marginTop:5, flexShrink:0 }}><Icons.Check/></span>{li}
              </li>
            ))}
          </ul>
        );
        return <p key={i} style={{ fontSize:17.5, color:'var(--mut)', lineHeight:1.85, marginBottom:18 }}>{b.p}</p>;
      })}
    </div>
  );
}

/* ════════ Single article ════════ */
function Article({ a, go }) {
  useEffect(() => { window.scrollTo(0, 0); }, [a.slug]);
  const related = ARTICLES.filter(x => x.slug !== a.slug).slice(0, 3);
  return (
    <>
      <PageHero kicker={a.cat} index={a.read} img={a.img} title={a.title} />
      <article className="wrap" style={{ maxWidth:820, padding:'70px 40px 40px' }}>
        <a href="#" onClick={(e)=>{e.preventDefault();go('');}} className="linkline" style={{ display:'inline-flex', alignItems:'center', gap:8, fontFamily:'var(--mono)', fontSize:11, letterSpacing:'.1em', textTransform:'uppercase', marginBottom:40 }}>
          <span style={{ display:'inline-flex', transform:'rotate(180deg)' }}><Icons.Arrow s={13}/></span> Tots els articles
        </a>
        <div style={{ display:'flex', alignItems:'center', gap:14, paddingBottom:26, marginBottom:14, borderBottom:'1px solid var(--line)', flexWrap:'wrap' }}>
          <Tag>{a.cat}</Tag>
          <span style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--faint)' }}>{a.date}</span>
          <span style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--faint)' }}>· {a.read} de lectura</span>
          <span style={{ marginLeft:'auto', fontFamily:'var(--mono)', fontSize:11, color:'var(--faint)' }}>Per Equip Ontec</span>
        </div>
        <p className="disp" style={{ fontSize:'clamp(22px,2.3vw,30px)', lineHeight:1.45, margin:'30px 0 40px' }}>{a.lede}</p>
        <ArticleBody blocks={a.body} />

        <div style={{ marginTop:64, padding:'40px 0', borderTop:'1px solid var(--line)', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:20 }}>
          <div>
            <div className="kicker" style={{ marginBottom:8 }}>Tens un projecte similar?</div>
            <div className="disp" style={{ fontSize:24 }}>En parlem.</div>
          </div>
          <a href="contacta.html" className="btn btn-primary">Contacta amb Ontec <Icons.UpRight s={14}/></a>
        </div>
      </article>

      <section style={{ borderTop:'1px solid var(--line)', padding:'80px 0 120px' }}>
        <div className="wrap-wide">
          <SectionLabel index="—">Continua llegint</SectionLabel>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:18 }} className="blog-grid">
            {related.map((p) => <Card key={p.slug} p={p} go={go} />)}
          </div>
        </div>
        <style>{`@media(max-width:860px){.blog-grid{grid-template-columns:1fr!important;}}`}</style>
      </section>
    </>
  );
}

/* ════════ Card ════════ */
function Card({ p, go, big }) {
  const onClick = (e) => { e.preventDefault(); go(p.slug); };
  if (big) return (
    <a href={'#'+p.slug} onClick={onClick} className="mcard bigcard" style={{ display:'grid', gridTemplateColumns:'1.1fr 1fr', minHeight:400 }}>
      <div style={{ position:'relative', minHeight:320 }}><Cine src={p.img} alt="" style={{ position:'absolute', inset:0 }}/></div>
      <div style={{ padding:'52px 56px', display:'flex', flexDirection:'column', justifyContent:'center' }} className="big-body">
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:22 }}>
          <Tag>{p.cat}</Tag>
          <span style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--faint)' }}>{p.date} · {p.read}</span>
        </div>
        <h2 className="disp" style={{ fontSize:'clamp(28px,3vw,46px)', marginBottom:18 }}>{p.title}</h2>
        <p style={{ fontSize:16, color:'var(--mut)', lineHeight:1.75, marginBottom:28 }}>{p.excerpt}</p>
        <span style={{ display:'inline-flex', alignItems:'center', gap:8, color:'var(--accent)', fontFamily:'var(--mono)', fontSize:11.5, letterSpacing:'.12em', textTransform:'uppercase' }}>Llegir article <Icons.UpRight s={14}/></span>
      </div>
    </a>
  );
  return (
    <a href={'#'+p.slug} onClick={onClick} className="mcard" style={{ display:'block' }}>
      <Cine src={p.img} alt="" style={{ height:220 }}/>
      <div style={{ padding:'26px 28px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
          <Tag>{p.cat}</Tag>
          <span style={{ fontFamily:'var(--mono)', fontSize:10.5, color:'var(--faint)' }}>{p.read}</span>
        </div>
        <h3 className="disp" style={{ fontSize:23, lineHeight:1.28, marginBottom:12 }}>{p.title}</h3>
        <p style={{ fontSize:14, color:'var(--mut)', lineHeight:1.65 }}>{p.excerpt}</p>
      </div>
    </a>
  );
}

        sub="Articles tècnics, casos reals i actualitat del sector escrits per l'equip d'Ontec." />
      <div className="wrap-wide" style={{ padding:'64px 40px 120px' }}>
        <div style={{ display:'flex', gap:8, marginBottom:54, flexWrap:'wrap' }}>
          {CATS.map(c=>(
            <button key={c} onClick={()=>setCat(c)}
              style={{ padding:'10px 18px', background:cat===c?'var(--accent)':'transparent', border:`1px solid ${cat===c?'var(--accent)':'var(--line)'}`, borderRadius:2,
                fontFamily:'var(--mono)', fontSize:11, letterSpacing:'.08em', textTransform:'uppercase', color:cat===c?'var(--accent-ink)':'var(--mut)', fontWeight:700, cursor:'pointer', transition:'all .15s' }}>
              {c}
            </button>
          ))}
        </div>
        {feat && <div style={{ marginBottom:18 }}><Card p={feat} go={go} big /></div>}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:18 }} className="blog-grid">
          {rest.map((p) => <Card key={p.slug} p={p} go={go} />)}
        </div>
      </div>
      <style>{`@media(max-width:860px){.blog-grid{grid-template-columns:1fr!important;}.bigcard{grid-template-columns:1fr!important;}.big-body{padding:34px 30px!important;}}`}</style>
    </>
  );
}

/* ════════ Root w/ hash routing ════════ */
function BlogPage() {
  const [slug, setSlug] = useState(location.hash.slice(1));
  useEffect(() => {
    const fn = () => setSlug(location.hash.slice(1));
    window.addEventListener('hashchange', fn);
    return () => window.removeEventListener('hashchange', fn);
  }, []);
  const go = (s) => { if (s) { location.hash = '#'+s; } else { history.replaceState(null,'',location.pathname); setSlug(''); } };
  const a = bySlug(slug);
  return (
    <PageShell activePage="Blog">
      {a ? <Article a={a} go={go} /> : <BlogList go={go} />}
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BlogPage/>);
</script>
</body>
