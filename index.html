<!DOCTYPE html>
<html lang="ca" data-mood="acid" data-voice="editorial" data-intensity="cinematic">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ontec — Sistemes tecnològics avançats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <style>
    html,body{background:#08090a;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const AREAS = [
  { n:'01', t:'IT Security' },
  { n:'02', t:'Comunicacions' },
  { n:'03', t:'Automatització' },
  { n:'04', t:'Audiovisuals' },
];

/* ── Hero ── */
function Hero() {
  return (
    <section style={{position:'relative',minHeight:'100vh',display:'flex',alignItems:'flex-end',overflow:'hidden'}}>
      <Cine src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=2000&q=80&auto=format&fit=crop" alt="Infraestructura tecnologica" shade={false} style={{position:'absolute',inset:0}}/>
      <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,rgba(0,0,0,.7) 0%,rgba(0,0,0,.35) 30%,rgba(0,0,0,.6) 62%,#000 100%)'}}/>
      <div style={{position:'absolute',inset:0,background:'linear-gradient(90deg,#000 0%,rgba(0,0,0,.55) 42%,transparent 80%)'}}/>
      <div style={{position:'absolute',inset:0,backgroundImage:`linear-gradient(${A(6)} 1px,transparent 1px),linear-gradient(90deg,${A(6)} 1px,transparent 1px)`,backgroundSize:'88px 88px',maskImage:'radial-gradient(ellipse 80% 70% at 50% 40%,#000,transparent)'}}/>
      <div style={{position:'absolute',left:0,right:0,top:0,height:1,background:`linear-gradient(90deg,transparent,${A(40)},transparent)`,animation:'scanline 8s linear infinite'}}/>
      <div className="wrap-wide" style={{position:'relative',zIndex:2,width:'100%',paddingBottom:80,paddingTop:140}}>
        <div style={{maxWidth:1100}}>
          <div className="reveal in eyebrow" style={{marginBottom:26}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:'var(--accent)',boxShadow:'0 0 10px var(--accent)'}}/>
            Andorra · Distribucio tecnologica des de 2016
          </div>
          <h1 className="disp" style={{fontSize:'clamp(48px,7.4vw,116px)',lineHeight:.92}}>
            Sistemes<br/>tecnologics<br/><span style={{color:'var(--accent)'}}>avancats</span>
          </h1>
          <p style={{marginTop:34,fontSize:'clamp(16px,1.5vw,20px)',color:'var(--mut)',lineHeight:1.7,maxWidth:560}}>
            Distribuim, integrem i donem suport a infraestructures tecnologiques per a empreses,
            arquitectures, enginyeries i installadors a Andorra.
          </p>
          <div style={{display:'flex',gap:14,marginTop:40,flexWrap:'wrap'}}>
            <a href="solucions.html" className="btn btn-primary">Veure solucions <Icons.UpRight s={15}/></a>
            <a href="contacta.html" className="btn btn-ghost">Parla amb un expert</a>
          </div>
        </div>
      </div>
      {[{top:96,left:40},{top:96,right:40},{bottom:120,left:40}].map((p,i)=>(
        <div key={i} style={{position:'absolute',width:16,height:16,zIndex:2,
          borderTop:i<2?`1px solid ${A(45)}`:'none',borderBottom:i>=2?`1px solid ${A(45)}`:'none',
          borderLeft:(i===0||i===2)?`1px solid ${A(45)}`:'none',borderRight:i===1?`1px solid ${A(45)}`:'none',...p}}/>
      ))}
      <style>{`@media(max-width:1100px){.hero-status{display:none;}}`}</style>
    </section>
  );
}

/* ── Manifesto / positioning ── */
function Manifesto() {
  return (
    <section style={{ padding:'130px 0 110px' }}>
      <div className="wrap-wide">
        <div style={{ display:'grid', gridTemplateColumns:'minmax(0,0.86fr) minmax(0,1.14fr)', gap:80, alignItems:'start' }} className="man-grid">
          <Reveal>
            <SectionLabel index="—">Qui som</SectionLabel>
          </Reveal>
          <Reveal delay={80}>
            <p className="disp" style={{ fontSize:'clamp(26px,2.9vw,46px)', lineHeight:1.22 }}>
              Som el soci tecnològic d'empreses, arquitectes i instal·ladors d'Andorra. Convertim infraestructura
              complexa en sistemes <em style={{ color:'var(--accent)' }}>fiables, discrets i preparats</em> per al que ve.
            </p>
            <div style={{ marginTop:46, display:'grid', gridTemplateColumns:'1fr 1fr', gap:1, background:'var(--line)', border:'1px solid var(--line)' }} className="man-stats">
              {[['10+','Anys operant'],['200+','Projectes lliurats'],['4','Àrees integrades'],['< 4h','Temps de resposta']].map(([n,l])=>(
                <div key={l} style={{ background:'var(--bg)', padding:'30px 28px' }}>
                  <div className="disp" style={{ fontSize:'clamp(34px,3.4vw,52px)' }}>{n}</div>
                  <div style={{ marginTop:8, fontFamily:'var(--mono)', fontSize:10.5, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--mut)' }}>{l}</div>
                </div>
              ))}
            </div>
          </Reveal>
        </div>
      </div>
      <style>{`@media(max-width:860px){.man-grid{grid-template-columns:1fr!important;gap:36px!important;}}`}</style>
    </section>
  );
}

/* ── Solutions gallery (editorial media cards) ── */
const SOLS = [
  { t:'IT Security', href:'solucions.html#it-security', n:'01', icon:<Icons.Shield/>, desc:'Protecció integral de la infraestructura digital.', img:'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=1100&q=80&auto=format&fit=crop' },
  { t:'Comunicacions', href:'solucions.html#comunicacions', n:'02', icon:<Icons.Wifi/>, desc:"Connectivitat d'alt rendiment per a qualsevol entorn.", img:'https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=1100&q=80&auto=format&fit=crop' },
  { t:'Automatització', href:'solucions.html#automatitzacio', n:'03', icon:<Icons.Cpu/>, desc:'Sistemes intel·ligents per a edificis i llars.', img:'https://images.unsplash.com/photo-1581094288338-2314dddb7ece?w=1100&q=80&auto=format&fit=crop' },
  { t:'Audiovisuals', href:'solucions.html#audiovisuals', n:'04', icon:<Icons.Screen/>, desc:'Sistemes A/V professionals per a qualsevol espai.', img:'https://images.unsplash.com/photo-1478737270239-2f02b77fc618?w=1100&q=80&auto=format&fit=crop' },
];
function SolutionsGallery() {
  return (
    <section style={{ padding:'40px 0 120px' }}>
      <div className="wrap-wide">
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:54, flexWrap:'wrap', gap:24 }}>
          <Reveal>
            <SectionLabel index="01">Solucions</SectionLabel>
            <h2 className="disp" style={{ fontSize:'clamp(38px,5.4vw,86px)' }}>Tot integrat,<br/><em>tot controlat</em></h2>
          </Reveal>
          <Reveal delay={120}>
            <a href="solucions.html" className="btn btn-ghost">Veure totes <Icons.UpRight s={14}/></a>
          </Reveal>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:18 }} className="gal-grid">
          {SOLS.map((s,i)=>(
            <Reveal key={s.t} delay={(i%2)*100}>
              <a href={s.href} className="mcard" style={{ height:420, display:'block' }}>
                <Cine src={s.img} alt={s.t} shade style={{ position:'absolute', inset:0 }}/>
                <div style={{ position:'relative', zIndex:1, height:'100%', display:'flex', flexDirection:'column', justifyContent:'space-between', padding:'32px 34px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                    <span style={{ color:'var(--accent)' }}>{s.icon}</span>
                    <span style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--mut)', letterSpacing:'.12em' }}>{s.n} / 04</span>
                  </div>
                  <div>
                    <h3 className="disp" style={{ fontSize:'clamp(30px,3.2vw,46px)', marginBottom:12 }}>{s.t}</h3>
                    <p style={{ fontSize:14.5, color:'rgba(236,235,227,.66)', lineHeight:1.6, maxWidth:380 }}>{s.desc}</p>
                    <div style={{ marginTop:20, display:'inline-flex', alignItems:'center', gap:8, fontFamily:'var(--mono)', fontSize:11, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--accent)' }}>Explorar <Icons.Arrow s={13}/></div>
                  </div>
                </div>
              </a>
            </Reveal>
          ))}
        </div>
      </div>
      <style>{`@media(max-width:760px){.gal-grid{grid-template-columns:1fr!important;}}`}</style>
    </section>
  );
}

/* ── Partners marquee ── */
function PartnersMarquee() {
  const partners = ['Fortinet','Cisco','Ubiquiti','KNX','Crestron','HPE Aruba','Palo Alto','Lutron','Samsung','Sony','QSC','Shure'];
  return (
    <section style={{ borderTop:'1px solid var(--line)', borderBottom:'1px solid var(--line)' }}>
      <div className="wrap" style={{ paddingTop:30, paddingBottom:18 }}>
        <div className="kicker" style={{ textAlign:'center' }}>Fabricants i partners certificats</div>
      </div>
      <div style={{ paddingBottom:32 }}>
        <Marquee items={partners} />
      </div>
    </section>
  );
}

/* ── Services list ── */
function ServicesList() {
  const svcs = [
    { n:'01', t:'Enginyeries', href:'serveis.html#ingenieries', d:'Prescripció, especificació i assistència tècnica.' },
    { n:'02', t:'Arquitectures', href:'serveis.html#arquitectures', d:'Tecnologia integrada des de la fase de projecte.' },
    { n:'03', t:'Instal·ladors', href:'serveis.html#installadors', d:'Subministre, preconfiguració i suport en obra.' },
    { n:'04', t:"Disseny d'Interiors", href:'serveis.html#disseny', d:'Tecnologia invisible, part del disseny.' },
  ];
  return (
    <section style={{ padding:'120px 0' }}>
      <div className="wrap-wide">
        <Reveal style={{ marginBottom:52 }}>
          <SectionLabel index="02">Serveis</SectionLabel>
          <h2 className="disp" style={{ fontSize:'clamp(38px,5.4vw,86px)' }}>Adaptat al <em>teu sector</em></h2>
        </Reveal>
        <div style={{ borderTop:'1px solid var(--line)' }}>
          {svcs.map((s,i)=>(
            <Reveal key={s.t} delay={i*60}>
              <a href={s.href} className="hover-row" style={{ display:'grid', gridTemplateColumns:'90px 1fr auto', gap:28, alignItems:'center',
                padding:'36px 8px', borderBottom:'1px solid var(--line)', textDecoration:'none' }}
                onMouseEnter={e=>{ e.currentTarget.style.background=A(6); e.currentTarget.style.paddingLeft='24px'; e.currentTarget.querySelector('.sv-t').style.color='var(--accent)'; }}
                onMouseLeave={e=>{ e.currentTarget.style.background='transparent'; e.currentTarget.style.paddingLeft='8px'; e.currentTarget.querySelector('.sv-t').style.color='var(--ink)'; }}>
                <span style={{ fontFamily:'var(--mono)', fontSize:13, color:'var(--faint)', letterSpacing:'.1em' }}>{s.n}</span>
                <div style={{ display:'flex', alignItems:'baseline', gap:26, flexWrap:'wrap' }}>
                  <span className="sv-t disp" style={{ fontSize:'clamp(26px,3.6vw,52px)', transition:'color .25s' }}>{s.t}</span>
                  <span style={{ fontSize:15, color:'var(--mut)' }}>{s.d}</span>
                </div>
                <span style={{ color:'var(--accent)' }}><Icons.UpRight s={22}/></span>
              </a>
            </Reveal>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ── Blog preview ── */
const BLOG = [
  { date:'Oct 2022', tag:'Comunicacions', slug:'fibra-optica-baqueira-beret', title:'Fusió de fibra òptica al telecadira de Baqueira-Beret', img:'https://images.unsplash.com/photo-1557597774-9d273605dfa9?w=900&q=80&auto=format&fit=crop' },
  { date:'Maig 2016', tag:'Domòtica', slug:'domotica-knx-edificis-premium', title:"La domòtica KNX arriba als edificis premium d'Andorra", img:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=900&q=80&auto=format&fit=crop' },
  { date:'2024', tag:'IT Security', slug:'zero-trust-pimes', title:'Zero Trust: el nou paradigma de seguretat per a pimes', img:'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=900&q=80&auto=format&fit=crop' },
];
function BlogPreview() {
  return (
    <section style={{ padding:'0 0 130px' }}>
      <div className="wrap-wide">
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:52, flexWrap:'wrap', gap:24 }}>
          <Reveal>
            <SectionLabel index="03">Blog</SectionLabel>
            <h2 className="disp" style={{ fontSize:'clamp(34px,4.6vw,76px)' }}>Últimes <em>notícies</em></h2>
          </Reveal>
          <Reveal delay={120}><a href="blog.html" className="btn btn-ghost">Veure tot <Icons.UpRight s={14}/></a></Reveal>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:18 }} className="blog-grid">
          {BLOG.map((p,i)=>(
            <Reveal key={i} delay={i*90}>
              <a href={'blog.html#'+p.slug} className="mcard" style={{ display:'block' }}>
                <Cine src={p.img} alt="" style={{ height:240 }}/>
                <div style={{ padding:'26px 28px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
                    <Tag>{p.tag}</Tag>
                    <span style={{ fontFamily:'var(--mono)', fontSize:10.5, color:'var(--faint)' }}>{p.date}</span>
                  </div>
                  <h4 className="disp" style={{ fontSize:22, lineHeight:1.28 }}>{p.title}</h4>
                </div>
              </a>
            </Reveal>
          ))}
        </div>
      </div>
      <style>{`@media(max-width:860px){.blog-grid{grid-template-columns:1fr!important;}}`}</style>
    </section>
  );
}

/* ── CTA ── */
function CtaBig() {
  return (
    <section style={{ position:'relative', overflow:'hidden', borderTop:'1px solid var(--line)' }}>
      <Cine src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=2000&q=80&auto=format&fit=crop" alt="" style={{ position:'absolute', inset:0 }}/>
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(180deg,var(--bg) 0%,rgba(8,9,10,.55) 50%,var(--bg) 100%)' }}/>
      <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse 60% 80% at 50% 50%,rgba(8,9,10,.15),var(--bg))' }}/>
      <div className="wrap" style={{ position:'relative', zIndex:1, padding:'150px 40px', textAlign:'center' }}>
        <Reveal>
          <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:26, justifyContent:'center' }}>
            <span style={{ width:42, height:1, background:'var(--accent)' }}/>
            <span className="kicker">Comencem</span>
            <span style={{ width:42, height:1, background:'var(--accent)' }}/>
          </div>
          <h2 className="disp" style={{ fontSize:'clamp(44px,8vw,132px)' }}>Tens un projecte<br/><em>en ment?</em></h2>
          <p style={{ margin:'30px auto 0', maxWidth:540, fontSize:18, color:'var(--mut)', lineHeight:1.7 }}>
            Explica'ns les teves necessitats i trobarem la millor solució tecnològica per al teu projecte.
          </p>
          <div style={{ display:'flex', gap:14, marginTop:42, justifyContent:'center', flexWrap:'wrap' }}>
            <a href="contacta.html" className="btn btn-primary">Contacta ara <Icons.UpRight s={15}/></a>
            <a href="tel:+37688559" className="btn btn-ghost"><Icons.Phone/> +376 88 55 99</a>
          </div>
        </Reveal>
      </div>
    </section>
  );
}

/* ── Group / CPD (Protecvall infrastructure backing) ── */
function GroupCPD() {
  const caps = ['Housing & colocation', 'Hosting gestionat', 'Còpies de seguretat remotes', 'Continuïtat de negoci'];
  return (
    <section style={{ padding:'120px 0' }}>
      <div className="wrap-wide">
        <Reveal>
          <div style={{ border:'1px solid var(--line)', borderRadius:3, overflow:'hidden', display:'grid', gridTemplateColumns:'1.02fr 1fr' }} className="cpd-grid">
            <div style={{ position:'relative', minHeight:520 }} className="cpd-img">
              <Cine src="https://images.unsplash.com/photo-1606904825846-647eb07f5be2?w=1400&q=80&auto=format&fit=crop" alt="Centre de procés de dades" style={{ position:'absolute', inset:0 }}/>
              <div style={{ position:'absolute', left:30, top:30, display:'flex', alignItems:'center', gap:10, zIndex:1 }}>
                <span style={{ width:6, height:6, background:'var(--accent)' }}/>
                <span style={{ fontFamily:'var(--mono)', fontSize:10.5, letterSpacing:'.16em', textTransform:'uppercase', color:'var(--ink)' }}>CPD · Andorra</span>
              </div>
            </div>
            <div style={{ background:'var(--panel)', padding:'64px 60px', display:'flex', flexDirection:'column', justifyContent:'center' }} className="cpd-body">
              <SectionLabel index="—">Grup tecnològic</SectionLabel>
              <h2 className="disp" style={{ fontSize:'clamp(32px,3.6vw,58px)' }}>Un CPD propi <em>al darrere</em></h2>
              <p style={{ marginTop:24, fontSize:16.5, color:'var(--mut)', lineHeight:1.8, maxWidth:480 }}>
                Compartim seu i direcció amb <strong style={{ color:'var(--ink)', fontWeight:600 }}>Protecvall</strong>, operadora d'un
                centre de procés de dades a Andorra. Això ens permet sustentar els projectes amb infraestructura
                local i sobirana — sense dependre de tercers fora del Principat.
              </p>
              <div style={{ marginTop:38, display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }} className="cpd-caps">
                {caps.map(c=>(
                  <div key={c} style={{ display:'flex', alignItems:'center', gap:12, paddingTop:16, borderTop:'1px solid var(--line)' }}>
                    <span style={{ color:'var(--accent)', flexShrink:0 }}><Icons.Check/></span>
                    <span style={{ fontSize:14, color:'var(--ink)' }}>{c}</span>
                  </div>
                ))}
              </div>
              <div style={{ marginTop:40, display:'flex', alignItems:'center', gap:12 }}>
                <span style={{ width:9, height:9, background:'var(--accent)', borderRadius:1, transform:'rotate(45deg)', display:'block' }}/>
                <span style={{ fontFamily:'var(--mono)', fontSize:11, letterSpacing:'.1em', color:'var(--faint)', textTransform:'uppercase' }}>En col·laboració amb Protecvall</span>
              </div>
            </div>
          </div>
        </Reveal>
      </div>
      <style>{`@media(max-width:880px){.cpd-grid{grid-template-columns:1fr!important;}.cpd-img{min-height:300px!important;}.cpd-body{padding:44px 32px!important;}.cpd-caps{grid-template-columns:1fr!important;}}`}</style>
    </section>
  );
}

/* ── Tweaks ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "acid",
  "voice": "editorial",
  "intensity": "cinematic"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(() => {
    const r = document.documentElement;
    r.setAttribute('data-mood', t.mood);
    r.setAttribute('data-voice', t.voice);
    r.setAttribute('data-intensity', t.intensity);
  }, [t.mood, t.voice, t.intensity]);

  return (
    <PageShell activePage="Inici">
      <Hero/>
      <Manifesto/>
      <SolutionsGallery/>
      <PartnersMarquee/>
      <GroupCPD/>
      <ServicesList/>
      <BlogPreview/>
      <CtaBig/>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Mood — paleta" />
        <TweakRadio label="Mood" value={t.mood}
          options={[{value:'acid',label:'Verd'},{value:'ice',label:'Gel'},{value:'flare',label:'Foc'},{value:'mono',label:'Mono'}]}
          onChange={(v)=>setTweak('mood',v)} />
        <TweakSection label="Voice — tipografia" />
        <TweakRadio label="Voice" value={t.voice}
          options={[{value:'editorial',label:'Serif'},{value:'modern',label:'Bold'},{value:'soft',label:'Soft'}]}
          onChange={(v)=>setTweak('voice',v)} />
        <TweakSection label="Intensity — atmosfera" />
        <TweakRadio label="Intensity" value={t.intensity}
          options={[{value:'calm',label:'Calm'},{value:'cinematic',label:'Cinema'},{value:'hyper',label:'Hyper'}]}
          onChange={(v)=>setTweak('intensity',v)} />
      </TweaksPanel>
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
