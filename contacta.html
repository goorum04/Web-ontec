<!DOCTYPE html>
<html lang="ca" data-mood="acid" data-voice="editorial" data-intensity="cinematic">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ontec — Contacta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="components.jsx"></script>
  <style>html,body{background:#000;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const inputStyle = {
  width:'100%', background:'rgba(255,255,255,.04)', border:'1px solid var(--line)',
  borderRadius:11, padding:'14px 16px', color:'var(--ink)', fontSize:15, outline:'none', transition:'border-color .15s, background .15s'
};
const labelStyle = { display:'block', fontFamily:'var(--mono)', fontSize:10, color:'var(--faint)', letterSpacing:'.12em', textTransform:'uppercase', marginBottom:8 };

function ContactaPage() {
  const [form, setForm] = useState({ name:'', company:'', email:'', phone:'', subject:'', service:'', message:'' });
  const [sent, setSent] = useState(false);
  const set = k => e => setForm(v=>({...v,[k]:e.target.value}));
  const focusIn = e => { e.target.style.borderColor = A(55); e.target.style.background='rgba(255,255,255,.06)'; };
  const focusOut = e => { e.target.style.borderColor = 'var(--line)'; e.target.style.background='rgba(255,255,255,.04)'; };

  return (
    <PageShell activePage="Contacta">
      <PageHero kicker="Contacta · Encamp, Andorra" img="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=2000&q=80&auto=format&fit=crop"
        title={<>Parlem del<br/>teu projecte</>}
        sub="Atenem projectes a tot el Principat i la seva àrea d'influència. Resposta en menys de 4 hores en horari laboral." />

      <div className="wrap-wide" style={{ padding:'80px 40px 110px' }}>
        <div style={{ display:'grid', gridTemplateColumns:'380px 1fr', gap:64 }} className="cta-grid">
          {/* Info */}
          <div>
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:32 }}>
              {[
                { icon:<Icons.Phone/>, label:'Telèfon', val:'+376 88 55 99', href:'tel:+37688559' },
                { icon:<Icons.Mail/>,  label:'Email',   val:'info@ontecandorra.com', href:'mailto:info@ontecandorra.com' },
                { icon:<Icons.Pin/>,   label:'Adreça',  val:'C/ de la Vena 3, Baixos\nEncamp, Andorra', href:'https://goo.gl/maps/V2XwnVKYeNouaBjKA' },
              ].map(c=>(
                <a key={c.label} href={c.href} target="_blank" rel="noreferrer"
                  style={{ display:'flex', alignItems:'flex-start', gap:16, textDecoration:'none', padding:'18px 20px', borderRadius:14, border:'1px solid var(--line)', background:'var(--panel)', transition:'border-color .2s' }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=A(40)} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--line)'}>
                  <div style={{ width:44, height:44, borderRadius:11, background:A(14), border:`1px solid ${A(28)}`, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--accent)', flexShrink:0 }}>{c.icon}</div>
                  <div>
                    <div className="kicker" style={{ color:'var(--faint)', fontSize:9.5, marginBottom:4 }}>{c.label}</div>
                    <div style={{ fontSize:15, color:'var(--ink)', fontWeight:500, whiteSpace:'pre-line', lineHeight:1.5 }}>{c.val}</div>
                  </div>
                </a>
              ))}
            </div>

            <div style={{ padding:'22px 24px', background:A(8), border:`1px solid ${A(22)}`, borderRadius:14, marginBottom:18 }}>
              <div className="kicker" style={{ color:'var(--accent)', fontSize:9.5, marginBottom:8 }}>Horari d'atenció</div>
              <div style={{ fontSize:15, color:'var(--mut)', lineHeight:1.6 }}>Dilluns a divendres<br/>08:00 – 17:00</div>
            </div>

            {/* Map visual */}
            <div style={{ width:'100%', height:220, borderRadius:16, border:'1px solid var(--line)', overflow:'hidden', position:'relative' }}>
              <div style={{ position:'absolute', inset:0, background:'linear-gradient(135deg,#0a1a0d 0%,#060d09 50%,#0d1318 100%)' }}/>
              <div style={{ position:'absolute', inset:0, backgroundImage:`linear-gradient(${A(12)} 1px,transparent 1px),linear-gradient(90deg,${A(12)} 1px,transparent 1px)`, backgroundSize:'30px 30px' }}/>
              <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} viewBox="0 0 360 220" preserveAspectRatio="xMidYMid slice">
                <circle cx="180" cy="110" r="40" stroke="var(--accent)" strokeWidth="0.5" fill="none" opacity="0.25"/>
                <circle cx="180" cy="110" r="70" stroke="var(--accent)" strokeWidth="0.4" fill="none" opacity="0.14"/>
                <line x1="120" y1="110" x2="240" y2="110" stroke="var(--accent)" strokeWidth="0.5" opacity="0.2"/>
                <line x1="180" y1="50" x2="180" y2="170" stroke="var(--accent)" strokeWidth="0.5" opacity="0.2"/>
              </svg>
              <div style={{ position:'relative', zIndex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:8 }}>
                <span style={{ position:'relative', width:14, height:14 }}>
                  <span style={{ position:'absolute', inset:0, borderRadius:'50%', background:'var(--accent)', boxShadow:'0 0 20px var(--accent)' }}/>
                  <span style={{ position:'absolute', inset:0, borderRadius:'50%', background:'var(--accent)', animation:'pulse-ring 2s ease-out infinite' }}/>
                </span>
                <span style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--accent)', letterSpacing:'.06em', marginTop:6 }}>Encamp, Andorra</span>
                <span style={{ fontFamily:'var(--mono)', fontSize:9, color:'var(--faint)', letterSpacing:'.04em' }}>C/ de la Vena 3, Baixos</span>
              </div>
            </div>
          </div>

          {/* Form */}
          <div style={{ background:'var(--panel)', border:'1px solid var(--line)', borderRadius:20, padding:'52px 56px' }} className="form-card">
            {sent ? (
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:420, gap:18, textAlign:'center' }}>
                <div style={{ width:64, height:64, borderRadius:'50%', background:A(16), border:`1px solid ${A(35)}`, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--accent)' }}><Icons.Check/></div>
                <h3 className="disp" style={{ fontSize:34 }}>Missatge enviat</h3>
                <p style={{ color:'var(--mut)', fontSize:15, lineHeight:1.7 }}>Gràcies pel teu contacte.<br/>Et respondrem en menys de 4 hores (en horari laboral).</p>
                <button onClick={()=>setSent(false)} className="btn btn-ghost" style={{ marginTop:8 }}>Enviar un altre missatge</button>
              </div>
            ) : (
              <form onSubmit={e=>{e.preventDefault();setSent(true);}} style={{ display:'flex', flexDirection:'column', gap:18 }}>
                <h3 className="disp" style={{ fontSize:'clamp(24px,2.4vw,34px)', marginBottom:8 }}>Envia'ns un missatge</h3>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }} className="ff-row">
                  <div><label style={labelStyle}>Nom complet</label><input type="text" placeholder="El teu nom" value={form.name} onChange={set('name')} required style={inputStyle} onFocus={focusIn} onBlur={focusOut}/></div>
                  <div><label style={labelStyle}>Empresa</label><input type="text" placeholder="Nom de l'empresa" value={form.company} onChange={set('company')} style={inputStyle} onFocus={focusIn} onBlur={focusOut}/></div>
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }} className="ff-row">
                  <div><label style={labelStyle}>Email</label><input type="email" placeholder="tu@empresa.com" value={form.email} onChange={set('email')} required style={inputStyle} onFocus={focusIn} onBlur={focusOut}/></div>
                  <div><label style={labelStyle}>Telèfon (opcional)</label><input type="tel" placeholder="+376 / +34 / +33..." value={form.phone} onChange={set('phone')} style={inputStyle} onFocus={focusIn} onBlur={focusOut}/></div>
                </div>
                <div>
                  <label style={labelStyle}>Àrea d'interès</label>
                  <select value={form.service} onChange={set('service')} style={{ ...inputStyle, appearance:'none', WebkitAppearance:'none', cursor:'pointer' }} onFocus={focusIn} onBlur={focusOut}>
                    <option value="" style={{background:'#0b0b0c'}}>Selecciona una àrea...</option>
                    {['IT Security','Comunicacions','Automatització','Audiovisuals','Servei per a Ingenierías','Servei per a Arquitectures','Servei per a Instal·ladors',"Disseny d'Interiors",'Altres'].map(o=><option key={o} style={{background:'#0b0b0c'}}>{o}</option>)}
                  </select>
                </div>
                <div><label style={labelStyle}>Assumpte</label><input type="text" placeholder="En qué et podem ajudar?" value={form.subject} onChange={set('subject')} required style={inputStyle} onFocus={focusIn} onBlur={focusOut}/></div>
                <div><label style={labelStyle}>Missatge</label><textarea placeholder="Descriu el teu projecte o consulta amb el màxim de detall possible…" value={form.message} onChange={set('message')} rows={5} required style={{ ...inputStyle, resize:'vertical' }} onFocus={focusIn} onBlur={focusOut}/></div>
                <button type="submit" className="btn btn-primary" style={{ justifyContent:'center', padding:'17px', fontSize:13 }}>Enviar missatge <Icons.UpRight s={15}/></button>
              </form>
            )}
          </div>
        </div>
      </div>
      <style>{`@media(max-width:880px){.cta-grid{grid-template-columns:1fr!important;}}@media(max-width:560px){.ff-row{grid-template-columns:1fr!important;}.form-card{padding:34px 26px!important;}}`}</style>
    </PageShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ContactaPage/>);
</script>
</body>
</html>
